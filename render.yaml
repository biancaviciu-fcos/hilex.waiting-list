services:
  - type: web
    name: hilex-waitlist
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: LAUNCH_DATE
        value: 2026-09-01T09:00:00+03:00
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
    disk:
      name: waitlist-data
      mountPath: /var/data
      sizeGB: 1

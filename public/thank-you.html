<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multumim | HiLex Individuals</title>
    <meta
      name="description"
      content="Inscrierea ta pe lista de asteptare HiLex Individuals a fost confirmata."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell thank-you-shell">
      <section class="thank-you-view" aria-label="Confirmare inscriere">

          <strong>Hi<span>Lex</span></strong>

        <div class="thank-you-card">
          <div class="mail-mark thank-you-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </div>

          <p class="pill thank-you-pill">INSCRIERE CONFIRMATA</p>
          <h1>Multumim<span id="thankYouName"></span>. Esti pe lista.</h1>
          <p>
            Ti-am trimis un email de confirmare. Vei fi printre primii care afla cand
            HiLex Individuals este gata de lansare.
          </p>

          <div class="thank-you-actions">
            <a class="primary-link" href="/">Inapoi la pagina principala</a>
          </div>
        </div>
      </section>
    </main>

    <script src="/script.js" type="module"></script>
